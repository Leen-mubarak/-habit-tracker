<!DOCTYPE html>
<html>
<body>

<h1>Habit Tracker</h1>

<form action="/add" method="POST">
    <input name="habit" placeholder="اكتب عادة">
    <button>Add</button>
</form>

<ul>
{% for habit in habits %}
    <li>
        {% if habit[2] == 1 %}
            <s>{{ habit[1] }}</s>
        {% else %}
            {{ habit[1] }}
            <a href="/complete/{{ habit[0] }}">✔️</a>
        {% endif %}

        <a href="/delete/{{ habit[0] }}">❌</a>
    </li>
{% endfor %}
</ul>

<a href="/logout">Logout</a>

</body>
</html>
